<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0c0a1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KasirKu">
<link rel="manifest" id="pwaManifest">
<title>KasirKu Pro v4</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0a1e;--bg2:#13112a;--bg3:#1a1836;
  --surface:#1e1c3a;--surface2:#252342;--surface3:#2d2b50;
  --border:#2e2c55;--border2:#3a3860;
  --accent:#6c63ff;--accent2:#8b83ff;--accent3:#a89fff;
  --green:#10d9a0;--amber:#f59e0b;--red:#ff4d6d;--blue:#38bdf8;
  --text:#e8e6ff;--text2:#a8a4d0;--text3:#6b6890;
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 40px rgba(0,0,0,.5);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*{font-family:var(--font);box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:box-shadow .2s,border-color .2s}
.card:hover{border-color:var(--border2)}
.card-glow{box-shadow:0 0 0 1px var(--accent),var(--shadow)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.45)}
.btn-success{background:linear-gradient(135deg,#059669,var(--green));color:#fff}
.btn-success:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(16,217,160,.35)}
.btn-danger{background:linear-gradient(135deg,#be123c,var(--red));color:#fff}
.btn-danger:hover:not(:disabled){transform:translateY(-1px)}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){background:var(--surface3);color:var(--text);border-color:var(--border2)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px}
.btn-icon{padding:8px;border-radius:var(--radius-sm)}

/* ── INPUTS ── */
.inp{width:100%;padding:10px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none;transition:border .15s,box-shadow .15s}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.2)}
.inp::placeholder{color:var(--text3)}
.inp option{background:var(--surface2)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.badge-purple{background:rgba(108,99,255,.2);color:var(--accent2)}
.badge-green{background:rgba(16,217,160,.15);color:var(--green)}
.badge-amber{background:rgba(245,158,11,.15);color:var(--amber)}
.badge-red{background:rgba(255,77,109,.15);color:var(--red)}
.badge-blue{background:rgba(56,189,248,.15);color:var(--blue)}
.badge-gray{background:var(--surface3);color:var(--text2)}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40;transition:transform .3s}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;text-decoration:none}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(108,99,255,.4)}
.nav-item .nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.nav-item.active .nav-icon{background:rgba(255,255,255,.2)}
.nav-item:not(.active) .nav-icon{background:var(--surface)}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:12px 12px 4px}

/* ── MAIN LAYOUT ── */
.app-main{margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:30;background:rgba(12,10,30,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.page-content{flex:1;padding:24px;overflow-y:auto}

/* ── STATS CARD ── */
.stat-card{padding:20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.08;background:currentColor}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{padding:11px 14px;text-align:left;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
.tbl tr:hover td{background:var(--surface2)}
.tbl tr:last-child td{border-bottom:none}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:60;background:rgba(5,4,20,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-height:90vh;overflow-y:auto}

/* ── PRINT ALERT ── */
.print-alert{position:fixed;top:80px;right:20px;z-index:55;width:340px;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);box-shadow:0 8px 32px rgba(108,99,255,.3);transform:translateX(400px);transition:transform .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
.print-alert.show{transform:translateX(0)}
.print-alert-bar{height:4px;background:linear-gradient(90deg,var(--accent),var(--green));animation:loadBar 10s linear forwards}
@keyframes loadBar{from{width:100%}to{width:0%}}

/* ── TOAST ── */
.toast{position:fixed;top:20px;right:20px;z-index:100;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:slideIn .3s ease;pointer-events:auto;max-width:320px}
.toast-item.out{animation:slideOut .3s ease forwards}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}
@keyframes slideOut{to{transform:translateX(120%);opacity:0}}

/* ── PROD CARD ── */
.prod-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .12s;user-select:none}
.prod-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow)}
.prod-card:active{transform:scale(.97)}
.prod-card.in-cart{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:8px 0}

/* ── ANIMATIONS ── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── NOTIFICATION DOT ── */
.notif-dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:var(--red);border-radius:50%;border:2px solid var(--bg2)}

/* ── PRINT QUEUE PULSE ── */
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── RESPONSIVE MOBILE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .app-main{margin-left:0}
  .page-content{padding:16px}
  .mob-hide{display:none!important}
}

/* ── PRINT ── */
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .app-main{margin-left:0}
  body{background:#fff;color:#000}
}

/* ── PROGRESS BAR ── */
.progress{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s ease}

/* ── PWA INSTALL BANNER ── */
.pwa-banner{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 20px;box-shadow:var(--shadow-lg);z-index:50;display:flex;align-items:center;gap:14px;max-width:360px;width:calc(100% - 40px);animation:slideUp .4s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(80px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ LOGIN ═══ -->
<div id="loginPage" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(108,99,255,.15),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(16,217,160,.08),transparent 50%),var(--bg)">
  <div style="width:100%;max-width:400px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto 16px;box-shadow:0 8px 32px rgba(108,99,255,.4)">🏪</div>
      <h1 style="font-size:28px;font-weight:900;color:var(--text)">KasirKu <span style="color:var(--accent)">Pro</span></h1>
      <p style="color:var(--text3);margin-top:4px;font-size:14px">Barokah Fotokopi & ATK — v4.0</p>
    </div>

        <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px">Username</label>
        <input id="loginUser" class="inp" placeholder="Masukkan username" autocomplete="username">

        <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px">Password</label>

      </button>

<div id="appPage" style="display:none">

  <!-- SIDEBAR -->

    <div style="padding:18px 16px;border-bottom:1px solid var(--border)">

  <!-- MAIN -->

          <span>🖨️</span><span id="printBadgeTxt" style="display:none;color:var(--accent)">0</span>
          <span id="printDot" class="notif-dot" style="display:none"></span>
        </button>
        <!-- Stok notif -->
        <button onclick="go('produk')" id="stokBtn" style="display:none;position:relative;background:var(--surface);border:1px solid var(--amber);border-radius:var(--radius-sm);padding:8px 12px;cursor:pointer;color:var(--amber);font-size:13px;font-weight:600">⚠️ Stok</button>
        <div style="text-align:right">

          <div id="hTime" style="font-size:13px;font-weight:700;color:var(--text);font-family:var(--mono)"></div>

    <!-- PRINT ALERT POPUP — auto-print notification -->
    <div id="printAlert" class="print-alert no-print">

      <div style="padding:14px 16px">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="font-size:28px;flex-shrink:0">🖨️</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbxFUaR0kpM2fdRMNPzDXXiWoh_QgN6KTt6egTayQd4tPX9L-tAKAGJi3ka_N1xM0Q8w/exec';

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let U = null, curPage = '';
let produkList=[], cart=[], antrianList=[], transaksiList=[];
let pelangganList=[], usersList=[], promoList=[], hutangList=[];
let charts={}, pollTimer=null, lastPrintCnt=-1;
let pendingPrintAlert=null, deferredPWA=null;
let activePromo=null;

// ═══════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════
async function api(action, params={}) {
  let url = API_URL + '?action=' + encodeURIComponent(action);
  for (let k in params) if (params[k]!=null) url += '&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k]);
  try {
    const r = await fetch(url,{redirect:'follow'});
    const t = await r.text();
    try { return JSON.parse(t); } catch(e) { return {success:false,message:'Respons server tidak valid'}; }
  } catch(e) { return {success:false,message:'Gagal terhubung: '+e.message}; }
}
async function apiPost(data) {
  try {
    const r = await fetch(API_URL,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});
    const t = await r.text();
    try { return JSON.parse(t); } catch(e) { return {success:false,message:'Respons server tidak valid'}; }
  } catch(e) { return {success:false,message:'Gagal kirim: '+e.message}; }
}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
const rp = n => 'Rp ' + Number(n||0).toLocaleString('id-ID');
const safeId = id => String(id).replace(/['"\\<>]/g,'');
function fmtDate(d) {
  if (!d) return '-';
  try { const dt=new Date(d); return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}); }
  catch(e) { return String(d); }
}
function fmtShort(d) {
  if (!d) return '-';
  try { return new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e) { return String(d); }
}
function fmtDateInput(d) {
  if (!d) return '';
  try { return new Date(d).toISOString().split('T')[0]; }
  catch(e) { return ''; }
}
const isAdmin = () => U?.role === 'admin';

function toast(msg, type='success') {
  const C={success:'var(--green)',error:'var(--red)',warning:'var(--amber)',info:'var(--accent)'};
  const I={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.borderLeft='3px solid '+C[type];
  el.innerHTML='<span style="font-size:16px">'+I[type]+'</span><span style="color:var(--text)">'+msg+'</span>';
  document.getElementById('toastBox').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),300)},3500);
}

function showModal(html,size='520px') {
  const b=document.getElementById('modalBox');
  b.style.maxWidth=size; b.innerHTML=html;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function loader(id,show) {
  const el=document.getElementById(id);
  if(el) el.style.display=show?'block':'none';
}

function playNotif() {
  try { const ctx=new AudioContext(); const osc=ctx.createOscillator(); const gain=ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.setValueAtTime(880,ctx.currentTime); gain.gain.setValueAtTime(.3,ctx.currentTime); gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3); osc.start(ctx.currentTime); osc.stop(ctx.currentTime+.3); } catch(e){}
}

function initPWA() {
  // Inject manifest dinamis
  const manifest={name:'KasirKu Pro',short_name:'KasirKu',start_url:'.',display:'standalone',background_color:'#0c0a1e',theme_color:'#0c0a1e',orientation:'portrait-primary',icons:[{src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%236c63ff"/><text y=".9em" font-size="70" x="15">🏪</text></svg>',sizes:'any',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  document.getElementById('pwaManifest').href=URL.createObjectURL(blob);

  // Register SW
  if ('serviceWorker' in navigator) {
    const swCode=`
      const CACHE='kasirku-v4';
      const ASSETS=['.'];
      self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
      self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
    `;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
  }

  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault(); deferredPWA=e;
    const b=document.getElementById('pwaBanner');
    if(b) b.style.display='flex';
    document.getElementById('pwaInstallBtn').onclick=()=>{
      deferredPWA.prompt();
      deferredPWA.userChoice.then(()=>{ b.style.display='none'; deferredPWA=null; });
    };
  });
}

async function doLogin() {
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value.trim();
  if(!u||!p) return toast('Isi username dan password!','warning');
  const btn=document.getElementById('btnLogin');
  document.getElementById('loginTxt').textContent='Memproses...';
  document.getElementById('loginSpin').classList.remove('hidden');
  btn.disabled=true;
  const res=await api('login',{u,p});
  document.getElementById('loginTxt').textContent='Masuk';
  document.getElementById('loginSpin').classList.add('hidden');
  btn.disabled=false;
  if(res.success){
    U=res.user; localStorage.setItem('kasirku_user',JSON.stringify(U));
    document.getElementById('loginPage').style.display='none';
    document.getElementById('appPage').style.display='block';
    startApp();
  } else {
    document.getElementById('loginErr').textContent=res.message;
    document.getElementById('loginErr').style.display='block';
    toast(res.message,'error');
  }
}
function doLogout(){
  if(!confirm('Yakin ingin logout?')) return;
  U=null; localStorage.removeItem('kasirku_user');
  if(pollTimer) clearInterval(pollTimer);
  document.getElementById('appPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
  document.getElementById('loginErr').style.display='none';
}
function checkSession(){
  try { const s=localStorage.getItem('kasirku_user'); if(s){U=JSON.parse(s);document.getElementById('loginPage').style.display='none';document.getElementById('appPage').style.display='block';startApp();} }
  catch(e){ localStorage.removeItem('kasirku_user'); }
}
document.getElementById('loginPass').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('loginUser').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});

function startApp(){
  buildSidebar(); tickClock(); setInterval(tickClock,1000);
  go('dashboard');
  pollTimer=setInterval(pollPrint,15000); pollPrint();
  initPWA();
}
function tickClock(){
  const n=new Date();
  document.getElementById('hDate').textContent=n.toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  document.getElementById('hTime').textContent=n.toLocaleTimeString('id-ID');
}
async function pollPrint(){
  const res=await api('getAntrianPrint');
  if(!res.success) return;
  antrianList=res.data;
  const pend=antrianList.filter(a=>a.status==='pending'||a.status==='proses');
  const cnt=pend.length;
  const dot=document.getElementById('printDot');
  const txt=document.getElementById('printBadgeTxt');
  if(cnt>0){txt.textContent=cnt;txt.style.display='inline';dot.style.display='block';}
  else{txt.style.display='none';dot.style.display='none';}
  // Tampilkan alert otomatis untuk antrian pending terbaru
  const newPending=antrianList.filter(a=>a.status==='pending');
  if(lastPrintCnt>=0 && cnt>lastPrintCnt && newPending.length>0){
    const latest=newPending[0];
    showPrintAlert(latest);
    playNotif();
  }
  lastPrintCnt=cnt;
}

  return cats.map(c=>`<button onclick="setCatFilter('${c}')" data-cat="${c}" class="cat-btn btn btn-sm ${c===posFilter?'btn-primary':'btn-ghost'}">${c}</button>`).join('');
}
function setCatFilter(cat){
  posFilter=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>{
    b.className='cat-btn btn btn-sm '+(b.dataset.cat===cat?'btn-primary':'btn-ghost');
  });

}

function renderProds(){
  let list=produkList.filter(p=>p.status==='aktif');
  if(posFilter!=='Semua') list=list.filter(p=>p.kategori===posFilter);
  if(posSearch){const s=posSearch.toLowerCase();list=list.filter(p=>p.nama.toLowerCase().includes(s));}
  const ic={ATK:'✏️',Fotokopi:'📄',Print:'🖨️',Jasa:'🔧'};
  const cc={ATK:'#3b82f6',Fotokopi:'#10b981',Print:'#8b5cf6',Jasa:'#f59e0b'};
  if(!list.length){document.getElementById('prodGrid').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)"><p style="font-size:32px;margin-bottom:8px">📭</p><p>Tidak ditemukan</p></div>';return;}
  document.getElementById('prodGrid').innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">'+
    list.map(p=>{
      const inC=cart.find(c=>c.id===p.id);
      return `<div onclick="addCart('${safeId(p.id)}')" class="prod-card${inC?' in-cart':''}">
        <div style="width:38px;height:38px;border-radius:10px;background:${cc[p.kategori]||'#6b7280'}22;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:10px">${ic[p.kategori]||'📦'}</div>
        <h4 style="font-size:13px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:5px">${p.nama}</h4>
        <p style="font-size:11px;color:var(--text3);margin-bottom:8px">${p.kategori} · ${p.stok>9000?'∞':p.stok+' '+p.satuan}</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-weight:700;color:var(--accent);font-size:13px">${rp(p.harga)}</span>
          ${inC?`<span class="badge badge-purple">${inC.qty}×</span>`:''}
        </div>
      </div>`;
    }).join('')+'</div>';
}

function addCart(id){
  const p=produkList.find(x=>x.id===id); if(!p) return;
  const ex=cart.find(c=>c.id===id);
  if(ex){if(ex.qty>=p.stok&&p.stok<=9000){toast('Stok tidak cukup!','warning');return;}ex.qty++;}
  else cart.push({id:p.id,nama:p.nama,harga:p.harga,qty:1,satuan:p.satuan});
  renderCart(); renderProds();
  // Cek promo otomatis
  checkAutoPromo();
}
function updQty(i,v){v=parseInt(v);if(v<=0)cart.splice(i,1);else cart[i].qty=v;renderCart();renderProds();checkAutoPromo();}
function rmCart(i){cart.splice(i,1);renderCart();renderProds();checkAutoPromo();}
function clearCart(){cart=[];activePromo=null;renderCart();renderProds();updCartTot();const pi=document.getElementById('promoInfo');if(pi)pi.style.display='none';}

async function checkAutoPromo(){
  const sub=cart.reduce((s,c)=>s+c.harga*c.qty,0);
  const res=await api('cekPromo',{kode:'__AUTO__',total:sub}); // server akan handle
  // Karena server tidak handle __AUTO__ via kode, hitung client-side dari promoList
  if(!promoList.length){const pr=await api('getPromo');if(pr.success)promoList=pr.data;}
  const now=new Date();
  let best=null;
  promoList.forEach(p=>{
    if(p.status!=='aktif') return;
    if(new Date(p.kadaluarsa)<now||new Date(p.berlaku)>now) return;
    if(sub<p.minBelanja) return;
    const pot=p.tipe==='persen'?Math.round(sub*p.nilai/100):p.nilai;
    if(!best||pot>best.potongan) best={...p,potongan:pot};
  });
  if(best&&(!activePromo||activePromo.id===best.id)){
    if(!activePromo){
      activePromo=best;
      toast('🏷️ Promo otomatis: '+best.nama+' (−'+rp(best.potongan)+')','info');
    }
    const pi=document.getElementById('promoInfo');
    const pt=document.getElementById('promoInfoTxt');
    if(pi&&pt){pt.textContent='🏷️ '+best.nama+' — hemat '+rp(best.potongan);pi.style.display='flex';}
  }
  updCartTot();
}

async function applyPromo(){
  const kode=document.getElementById('promoInput')?.value?.trim();
  if(!kode) return;
  const sub=cart.reduce((s,c)=>s+c.harga*c.qty,0);
  const res=await api('cekPromo',{kode,total:sub});
  if(res.success){
    activePromo={...res.promo};
    const pi=document.getElementById('promoInfo');
    const pt=document.getElementById('promoInfoTxt');
    if(pi&&pt){pt.textContent='🏷️ '+res.promo.nama+' — hemat '+rp(res.promo.potongan);pi.style.display='flex';}
    toast('Promo diterapkan: -'+rp(res.promo.potongan),'success');
    updCartTot();
  } else toast(res.message,'error');
}
function clearPromo(){
  activePromo=null;
  const pi=document.getElementById('promoInfo');
  if(pi) pi.style.display='none';
  updCartTot();
}

let cartPelanggan=null;
function showPelangganCart(){
  showModal(`<div style="padding:24px">
    <h3 style="font-weight:800;font-size:16px;color:var(--text);margin-bottom:20px">👤 Tambah Pelanggan</h3>

      <div><label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px">Nama</label><input id="cp_nm" class="inp" placeholder="Nama pelanggan" value="${cartPelanggan?.nama||''}"></div>
      <div><label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px">No HP</label><input id="cp_hp" class="inp" placeholder="08xxx" value="${cartPelanggan?.noHP||''}"></div>
    </div>

}
function savePelangganCart(){

function renderCart(){
  document.getElementById('cartCnt').textContent=cart.length;
  document.getElementById('btnPay').disabled=cart.length===0;
  const cl=document.getElementById('cartList');
  if(!cart.length){cl.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:8px"><span style="font-size:36px">🛒</span><span style="font-size:13px">Keranjang kosong</span></div>';updCartTot();return;}
  cl.innerHTML=cart.map((c,i)=>`
    <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="flex:1;min-width:0">
        <p style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.nama}</p>
        <p style="font-size:11px;color:var(--text3)">${rp(c.harga)}</p>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button onclick="updQty(${i},${c.qty-1})" style="width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--text);font-weight:700">−</button>
        <input type="number" value="${c.qty}" min="1" onchange="updQty(${i},this.value)" style="width:36px;text-align:center;font-size:13px;font-weight:700;background:transparent;border:none;color:var(--text)">
        <button onclick="updQty(${i},${c.qty+1})" style="width:26px;height:26px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--accent);font-weight:700">+</button>
      </div>
      <div style="text-align:right;min-width:70px">
        <p style="font-size:13px;font-weight:700;color:var(--text)">${rp(c.harga*c.qty)}</p>
        <button onclick="rmCart(${i})" style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer">Hapus</button>
      </div>
    </div>`).join('');
  updCartTot();
}

function updCartTot(){
  const sub=cart.reduce((s,c)=>s+c.harga*c.qty,0);
  const dk=parseInt(document.getElementById('cartDisk')?.value||0);
  const promoPot=activePromo?activePromo.potongan:0;
  const tot=Math.max(0,sub-dk-promoPot);
  if(document.getElementById('cartSub')) document.getElementById('cartSub').textContent=rp(sub);
  if(document.getElementById('cartTot')) document.getElementById('cartTot').textContent=rp(tot);
  const pcl=document.getElementById('promoCartLine');
  const pcn=document.getElementById('promoCartName');
  const pcv=document.getElementById('promoCartVal');
  if(pcl&&activePromo){pcn.textContent='🏷️ '+activePromo.nama;pcv.textContent='-'+rp(promoPot);pcl.style.display='flex';}
  else if(pcl) pcl.style.display='none';
}
function getCartTot(){
  const sub=cart.reduce((s,c)=>s+c.harga*c.qty,0);
  const dk=parseInt(document.getElementById('cartDisk')?.value||0);
  const promoPot=activePromo?activePromo.potongan:0;
  const diskonTotal=dk+promoPot;
  return{subtotal:sub,diskon:diskonTotal,promoId:activePromo?.id||'',total:Math.max(0,sub-diskonTotal)};
}

let payMethod='Tunai';
function showPay(){
  if(!cart.length) return;
  const{subtotal,diskon,total}=getCartTot();
  const qk=[total,Math.ceil(total/1000)*1000,Math.ceil(total/5000)*5000,Math.ceil(total/10000)*10000,50000,100000,200000].filter((v,i,a)=>v>=total&&a.indexOf(v)===i).sort((a,b)=>a-b).slice(0,6);
  payMethod='Tunai';
  showModal(`<div style="padding:24px">
    <h3 style="font-weight:800;font-size:18px;color:var(--text);margin-bottom:20px">💳 Pembayaran</h3>
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--text3)">Subtotal</span><span style="color:var(--text)">${rp(subtotal)}</span></div>
      ${diskon>0?`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:var(--text3)">Diskon</span><span style="color:var(--red)">-${rp(diskon)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:900;color:var(--accent);padding-top:10px;border-top:1px solid var(--border)"><span>TOTAL</span><span>${rp(total)}</span></div>
    </div>
    <div style="margin-bottom:18px">
      <label style="display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px">Metode Pembayaran</label>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${['Tunai','Transfer','QRIS','Hutang'].map(m=>`<button id="pm_${m}" onclick="selPay('${m}')" class="btn btn-sm ${m==='Tunai'?'btn-primary':'btn-ghost'}">${m==='Tunai'?'💵':m==='Transfer'?'🏦':m==='QRIS'?'📱':'📒'} ${m}</button>`).join('')}
      </div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px">${qk.map(q=>`<button onclick="document.getElementById('payAmt').value=${q};calcChg()" class="btn btn-ghost btn-sm">${rp(q)}</button>`).join('')}</div>
      <div style="background:rgba(16,217,160,.08);border:1px solid var(--green);border-radius:var(--radius-sm);padding:12px;text-align:center">
        <p style="font-size:12px;color:var(--text3)">Kembalian</p>
        <p id="chgAmt" style="font-size:24px;font-weight:900;color:var(--green)">Rp 0</p>
      </div>
    </div>
    <div id="hutangSec" style="display:none">
      <div style="background:rgba(255,77,109,.08);border:1px solid var(--red);border-radius:var(--radius-sm);padding:14px">
        <p style="font-size:13px;color:var(--red);font-weight:600">⚠️ Transaksi ini akan dicatat sebagai hutang pelanggan.</p>
        <p style="font-size:12px;color:var(--text3);margin-top:6px">Pastikan data pelanggan sudah diisi di keranjang.</p>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1">Batal</button>

  </div>`,'480px');
  calcChg();
}

function selPay(m){
  payMethod=m;
  ['Tunai','Transfer','QRIS','Hutang'].forEach(x=>{
    const el=document.getElementById('pm_'+x);
    if(el) el.className='btn btn-sm '+(x===m?'btn-primary':'btn-ghost');
  });
  const ts=document.getElementById('tunaiSec');
  const hs=document.getElementById('hutangSec');
  if(ts) ts.style.display=m==='Tunai'?'block':'none';
  if(hs) hs.style.display=m==='Hutang'?'block':'none';
}

function calcChg(){
  const{total}=getCartTot();
  const bay=parseInt(document.getElementById('payAmt')?.value||0);
  const chg=bay-total;
  const el=document.getElementById('chgAmt');
  if(el){el.textContent=rp(Math.max(0,chg));el.style.color=chg>=0?'var(--green)':'var(--red)';}
}

async function processPay(){
  const{subtotal,diskon,promoId,total}=getCartTot();
  const bayar=payMethod==='Tunai'?parseInt(document.getElementById('payAmt')?.value||0):total;
  if(payMethod==='Tunai'&&bayar<total) return toast('Jumlah bayar kurang!','error');
  if(payMethod==='Hutang'&&!cartPelanggan?.noHP) return toast('Isi data pelanggan dulu untuk pembayaran hutang','warning');
  const btn=document.getElementById('btnProcPay');
  if(btn){btn.disabled=true;btn.textContent='Memproses...';}
  const data={action:'simpanTransaksi',kasirId:U.id,kasirNama:U.nama,items:cart,subtotal,diskon,promoId,total,bayar,kembalian:Math.max(0,bayar-total),metodeBayar:payMethod,pelangganHP:cartPelanggan?.noHP||'',pelangganNama:cartPelanggan?.nama||'',pelangganId:''};
  const res=await apiPost(data);
  if(res.success){
    toast('Transaksi berhasil! '+res.id);
    closeModal();
    showReceipt({...data,id:res.id,tanggal:new Date(),total:res.total||total,diskon:res.diskon||diskon});
    cart=[]; activePromo=null; cartPelanggan=null;
    renderCart(); renderProds(); updCartTot();
    const pi=document.getElementById('promoInfo');if(pi)pi.style.display='none';
    const pr=await api('getProduk');
    if(pr.success) produkList=pr.data.filter(p=>p.status==='aktif');
  } else {
    toast(res.message||'Gagal','error');
    if(btn){btn.disabled=false;btn.textContent='✅ Proses';}
  }
}

        ${trx.diskon>0?`<div style="display:flex;justify-content:space-between"><span>Diskon</span><span style="color:var(--red)">-${rp(trx.diskon)}</span></div>`:''}

        <div style="display:flex;justify-content:space-between;margin-top:4px"><span>Bayar (${trx.metodeBayar})</span><span>${rp(trx.bayar)}</span></div>
        <div style="display:flex;justify-content:space-between"><span>Kembalian</span><span style="color:var(--green)">${rp(trx.kembalian)}</span></div>
      </div>
      <div style="border-top:1px dashed var(--border2);margin:10px 0"></div>
      <p style="text-align:center;font-size:11px;color:var(--text3)">Terima kasih!</p>
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeModal()" class="btn btn-ghost" style="flex:1">Tutup</button>
      <button onclick="printRC()" class="btn btn-primary" style="flex:1">🖨️ Cetak Struk</button>
    </div>
  </div>`,'400px');
}

function printRC(){
  const c=document.getElementById('rcContent');
  if(!c) return;
  try{
    const w=window.open('','_blank','width=380,height=640');
    if(!w){toast('Izinkan popup untuk mencetak','warning');return;}
    w.document.write('<html><head><title>Struk</title><style>body{font-family:monospace;font-size:12px;margin:10px;width:300px;color:#000;background:#fff}*{box-sizing:border-box}.flex{display:flex}.jb{justify-content:space-between}</style></head><body>'+c.innerHTML.replace(/style="[^"]*color:[^"]*var\([^)]+\)[^"]*"/g,'')+'<script>window.print();setTimeout(function(){window.close()},1000)<\/script></body></html>');

function printFromUrl(url){
  try{
    const w=window.open(url,'_blank');
    if(!w){toast('Popup diblokir. Klik "Buka File" untuk print manual.','warning');return;}
    setTimeout(()=>{try{w.print();}catch(e){}},1500);
  }catch(e){toast('Buka file di tab baru lalu Ctrl+P untuk print','info');}
}

async function exportLaporan(format){
  toast('Memuat data laporan...','info');
  const d1=document.getElementById('lapD1').value;
  const d2=document.getElementById('lapD2').value;
  const res=await api('getTransaksi',{kasirId:'all',dari:d1,sampai:d2});
  if(!res.success) return toast(res.message,'error');
  const list=res.data;
  if(!list.length) return toast('Tidak ada data untuk periode ini','warning');
  if(format==='excel') exportTrxToExcel(list,'Laporan_Transaksi');
  else exportTrxToPDF(list,d1,d2);
}

function exportTrxToExcel(list,filename){
  const rows=[['ID','Tanggal','Kasir','Items','Subtotal','Diskon','Total','Bayar','Kembalian','Metode']];
  list.forEach(t=>{
    let items=[]; try{items=typeof t.items==='string'?JSON.parse(t.items):t.items;}catch(e){}
    const itemsStr=items.map(i=>i.nama+'×'+i.qty).join(', ');
    rows.push([t.id,fmtDate(t.tanggal),t.kasirNama,itemsStr,t.subtotal,t.diskon,t.total,t.bayar,t.kembalian,t.metodeBayar]);
  });
  const total=list.reduce((s,t)=>s+t.total,0);
  rows.push(['','','','','','TOTAL',total,'','','']);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:18},{wch:14},{wch:40},{wch:14},{wch:12},{wch:14},{wch:14},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'Transaksi');
  XLSX.writeFile(wb,filename+'_'+new Date().toLocaleDateString('id-ID').replace(/\//g,'-')+'.xlsx');
  toast('Excel berhasil didownload','success');
}

function exportTrxToPDF(list,d1,d2){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape'});
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('LAPORAN TRANSAKSI',14,14);
  doc.setFontSize(10); doc.setFont('helvetica','normal');
  doc.text('Periode: '+(d1||'Semua')+' s/d '+(d2||'Sekarang'),14,22);
  doc.text('Dicetak: '+new Date().toLocaleDateString('id-ID'),14,28);
  let y=38;
  const headers=['ID','Tanggal','Kasir','Total','Metode'];
  const colW=[50,40,35,30,25];
  let x=14;
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  headers.forEach((h,i)=>{doc.text(h,x,y);x+=colW[i];});
  y+=6; doc.line(14,y,283,y); y+=4;
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  let totalAll=0;
  list.forEach(t=>{
    if(y>185){doc.addPage();y=20;}
    x=14;
    const cols=[t.id.slice(-12),fmtDate(t.tanggal).slice(0,16),t.kasirNama,'Rp'+Number(t.total).toLocaleString('id-ID'),t.metodeBayar];
    cols.forEach((c,i)=>{doc.text(String(c),x,y);x+=colW[i];});
    totalAll+=t.total; y+=6;
  });
  y+=4; doc.line(14,y,283,y); y+=6;
  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('TOTAL: Rp'+totalAll.toLocaleString('id-ID'),14,y);
  doc.save('Laporan_Transaksi_'+new Date().toLocaleDateString('id-ID').replace(/\//g,'-')+'.pdf');
  toast('PDF berhasil didownload','success');
}

function triggerPWAInstall(){
  if(deferredPWA){deferredPWA.prompt();deferredPWA.userChoice.then(()=>{deferredPWA=null;document.getElementById('pwaBanner').style.display='none';});}
  else toast('Buka di browser Chrome/Edge dan gunakan menu "Add to Home Screen"','info');
}

async function chgPwd(){
  const o=document.getElementById('op').value,n=document.getElementById('np').value,n2=document.getElementById('np2').value;
  if(!o||!n) return toast('Isi semua field','warning');
  if(n!==n2) return toast('Password baru tidak cocok','error');
  if(n.length<4) return toast('Minimal 4 karakter','warning');
  const res=await apiPost({action:'ubahPassword',userId:U.id,passwordLama:o,passwordBaru:n});
  if(res.success){toast('Password berhasil diubah! ✅');document.getElementById('op').value='';document.getElementById('np').value='';document.getElementById('np2').value='';}
  else toast(res.message,'error');
}

// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(!U) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='F2'){e.preventDefault();go('pos');}
  if(e.key==='F3'){e.preventDefault();go('print');}
  if(e.key==='F9'){e.preventDefault();if(curPage==='pos'&&cart.length)showPay();}
});
